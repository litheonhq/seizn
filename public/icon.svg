<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.25" cy="0.20" r="0.9">
      <stop offset="0%" stop-color="#0B122A" stop-opacity="0.03"/>
      <stop offset="65%" stop-color="#0B122A" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#shine)"/>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="none" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="4"/>

  <!-- S Lettermark (path-based, no font dependency) -->
  <path d="M 600 310 C 600 245, 545 205, 470 205 C 375 205, 315 255, 315 335 C 315 405, 375 445, 470 485 C 565 525, 625 565, 625 645 C 625 735, 565 785, 470 785 C 385 785, 325 735, 325 670"
    fill="none" stroke="#0A0A0A" stroke-width="80" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Green Square Dot -->
  <rect x="688" y="640" width="72" height="72" rx="14" fill="#34D399"/>
</svg>
