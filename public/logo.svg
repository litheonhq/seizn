        stroke="#10B981"
        stroke-width="16"
        stroke-linecap="round"
        fill="none"/>

  <!-- Memory dots/nodes -->
  <circle cx="60" cy="70" r="6" fill="#10B981"/>
  <circle cx="140" cy="70" r="6" fill="#10B981"/>
  <circle cx="60" cy="110" r="6" fill="#10B981"/>
  <circle cx="140" cy="150" r="6" fill="#10B981"/>

  <!-- Connection lines -->
  <line x1="60" y1="70" x2="45" y2="55" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="70" x2="155" y2="55" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="150" x2="155" y2="165" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="110" x2="45" y2="125" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
</svg>