# Thin caller — logic lives in iruhana/claude-workflows
# seizn: AI 메모리 OS + MCP 서버 → MCP/메모리/AI 컨텍스트 우선
# CLI: gh workflow run claude-continuous.yml -f tasks="mcp-protocol,memory-graph" -f max_cycles=3
name: Claude Continuous
on:
  workflow_dispatch:
    inputs:
      tasks:
        description: Comma-separated task presets to run
        required: false
        type: string
        default: 'mcp-protocol,memory-graph,ai-context,security,code-quality,performance,dead-code'
      scope:
        description: File/directory scope
        required: false
        type: string
        default: 'all'
      max_cycles:
        description: Maximum cycles (0 = unlimited)
        required: false
        type: string
        default: '0'
      cooldown:
        description: Cooldown seconds between cycles
        required: false
        type: string
        default: '120'
      provider:
        description: AI provider
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    uses: iruhana/claude-workflows/.github/workflows/claude-continuous.yml@v1
    with:
      tasks: ${{ inputs.tasks }}
      scope: ${{ inputs.scope }}
      max_cycles: ${{ inputs.max_cycles }}
      cooldown: ${{ inputs.cooldown }}
      provider: ${{ inputs.provider }}
    secrets: inherit
