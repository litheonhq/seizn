name: Claude Continuous

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: Comma-separated task presets. Used to choose audit depth only.
        required: false
        type: string
        default: 'mcp-protocol,memory-graph,ai-context,security,code-quality,performance,dead-code'
      scope:
        description: File/directory scope. Recorded for operator context only.
        required: false
        type: string
        default: 'all'
      max_cycles:
        description: Compatibility-only cycle count. Repo-local workflow runs one deterministic pass.
        required: false
        type: string
        default: '1'
      cooldown:
        description: Compatibility-only cooldown seconds.
        required: false
        type: string
        default: '120'
      idle_cycles:
        description: Compatibility-only idle cycle count.
        required: false
        type: string
        default: '2'
      provider:
        description: Compatibility-only provider label.
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: read

concurrency:
  group: claude-continuous-${{ github.ref }}-${{ inputs.tasks }}-${{ inputs.scope }}
  cancel-in-progress: true

jobs:
  audit:
    name: Repo-local continuous gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: ${{ contains(inputs.tasks, 'security') && 'strategic' || 'full' }}
      auto_commit: false
      provider: ${{ inputs.provider }}
