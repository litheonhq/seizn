name: Retrieval Regression Tests

on:
  # Run on push to main
  push:
    branches:
      - main
      - master
    paths:
      - 'src/lib/retrieval/**'
      - 'src/lib/testing/**'
      - 'src/app/api/testing/**'
      - 'supabase/migrations/**'

  # Run on PRs
  pull_request:
    branches:
      - main
      - master

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      suite_id:
        description: 'Specific test suite ID (leave empty for all)'
        required: false
        type: string
      threshold:
        description: 'Minimum pass rate percentage'
        required: false
        default: '100'
        type: string

  # Scheduled runs
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  regression-tests:
    name: Run Retrieval Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Run Regression Tests
        env:
          SEIZN_API_KEY: ${{ secrets.SEIZN_API_KEY }}
          SEIZN_API_URL: ${{ vars.SEIZN_API_URL || 'https://seizn.com' }}
        run: |
          ARGS=""

          # Check if specific suite requested
          if [ -n "${{ github.event.inputs.suite_id }}" ]; then
            ARGS="--suite-id ${{ github.event.inputs.suite_id }}"
          else
            ARGS="--all"
          fi

          # Add threshold
          THRESHOLD="${{ github.event.inputs.threshold || '100' }}"
          ARGS="$ARGS --threshold $THRESHOLD"

          # Add verbose for PRs
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS="$ARGS --verbose"
          fi

          echo "Running: npx ts-node scripts/ci/regression-test.ts $ARGS"
          npx ts-node scripts/ci/regression-test.ts $ARGS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ❌ Retrieval Regression Tests Failed\n\nSome retrieval tests did not pass. Please review the test results in the Actions tab.'
            })

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: regression-tests
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Send notification
        run: |
          echo "Scheduled regression tests failed"
          # Add your notification logic here (Slack, email, etc.)
          # Example: curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Retrieval regression tests failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
