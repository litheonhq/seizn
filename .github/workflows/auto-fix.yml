name: Auto Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number. Recorded for operator context only.
        required: false
        type: string
      max_retries:
        description: Compatibility-only retry count. Repo-local workflow does not mutate code.
        type: choice
        options: ['1', '2', '3']
        default: '3'
      model:
        description: Compatibility-only model label.
        type: choice
        options: [sonnet, opus]
        default: sonnet
      provider:
        description: Compatibility-only provider label.
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: auto-fix-pr-${{ inputs.pr_number || 'default' }}
  cancel-in-progress: true

jobs:
  audit:
    name: Repo-local diagnostic gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: full
      auto_commit: false
      provider: ${{ inputs.provider }}
