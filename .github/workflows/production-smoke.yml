name: Production Smoke

# Runs scripts/production-smoke.mjs against production.
# Writes a smoke user, API key, memory, then cleans up. Dispatch-only by design
# so the operator triggers it after deploys instead of running on a clock.
#
# Required repo secrets (configure under Settings → Secrets and variables → Actions):
#   PROD_SUPABASE_URL              — Supabase production URL
#   PROD_SUPABASE_SERVICE_ROLE_KEY — service-role JWT for admin user mgmt
#   PROD_NEXTAUTH_URL              — e.g. https://www.seizn.com (no trailing slash)
#   PROD_SMOKE_USER_EMAIL          — optional, defaults to smoke+production-dashboard@seizn.test
#   PROD_SMOKE_USER_PASSWORD       — optional, regenerated each run if absent
#   PROD_SMOKE_USER_NAME           — optional, defaults to "Production Smoke Account"
#
# The `SMOKE_SKIP_VERCEL_PULL=true` flag tells the script to use these env vars
# directly instead of running `vercel env pull` (which would require VERCEL_TOKEN
# and a linked project — additional secret surface we avoid by passing values).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this smoke is being run (e.g. post-deploy verification of PR #XXX)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  production-smoke:
    name: Run production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          missing=0
          for name in PROD_SUPABASE_URL PROD_SUPABASE_SERVICE_ROLE_KEY PROD_NEXTAUTH_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          PROD_NEXTAUTH_URL: ${{ secrets.PROD_NEXTAUTH_URL }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke
        env:
          SMOKE_SKIP_VERCEL_PULL: 'true'
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_URL: ${{ secrets.PROD_NEXTAUTH_URL }}
          TEST_USER_EMAIL: ${{ secrets.PROD_SMOKE_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PROD_SMOKE_USER_PASSWORD }}
          TEST_USER_NAME: ${{ secrets.PROD_SMOKE_USER_NAME }}
        run: node scripts/production-smoke.mjs

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-playwright
          path: |
            output/playwright/**
            test-results/**
          retention-days: 14
          if-no-files-found: ignore
