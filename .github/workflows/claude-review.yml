name: Claude Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number. Recorded for operator context only.
        required: true
        type: string
      model:
        description: Compatibility-only model label.
        type: choice
        options: [auto, sonnet, opus]
        default: auto
      provider:
        description: Compatibility-only provider label.
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: claude-review-pr-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  audit:
    name: Repo-local PR review gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: full
      auto_commit: false
      provider: ${{ inputs.provider }}
