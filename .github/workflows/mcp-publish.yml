name: MCP Server Release

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.9.0-beta.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seizn/mcp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: packages/seizn-mcp
        run: npm install

      - name: Build MCP server
        working-directory: packages/seizn-mcp
        run: npm run build

      - name: Publish MCP
        working-directory: packages/seizn-mcp
        # cwd inside the package avoids workspace-root repository auto-detect issues.
        # --provenance omitted until Trusted Publisher is configured for @seizn/mcp on npmjs.com.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PUBLISH }}
