name: MCP Server Release

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seizn/mcp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --prefix packages/seizn-mcp

      - name: Build MCP server
        run: npm run build --prefix packages/seizn-mcp

      - name: Publish MCP
        # --provenance omitted until Trusted Publisher is configured for @seizn/mcp on npmjs.com.
        # First-time publish of a new scoped package with --provenance returns 404 on registry PUT.
        # Restore once the package has at least one published version.
        run: npm publish packages/seizn-mcp --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PUBLISH }}
