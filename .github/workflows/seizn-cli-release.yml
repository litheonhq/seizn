name: Seizn CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seizn/cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --prefix cli/seizn

      - name: Build CLI
        run: npm run build --prefix cli/seizn

      - name: Publish CLI
        # --provenance omitted until Trusted Publisher is configured for @seizn/cli on npmjs.com.
        # First-time publish of a new scoped package with --provenance returns 404 on registry PUT.
        # Restore once the package has at least one published version.
        run: npm publish cli/seizn --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PUBLISH }}
