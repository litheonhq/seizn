name: Seizn CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seizn/cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --prefix cli/seizn

      - name: Build CLI
        run: npm run build --prefix cli/seizn

      - name: Publish CLI
        run: npm publish cli/seizn --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
