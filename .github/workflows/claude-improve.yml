name: Claude Improve

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: Type of improvement task
        type: choice
        options:
          - mcp-protocol
          - memory-graph
          - ai-context
          - security
          - code-quality
          - performance
          - dead-code
          - tech-debt
          - custom
          - deps-update
          - accessibility
          - seo
        default: mcp-protocol
      task:
        description: Custom task description. Recorded for operator context only.
        required: false
        type: string
      scope:
        description: File/directory scope. Recorded for operator context only.
        required: false
        type: string
        default: all
      model:
        description: Compatibility-only model label.
        type: choice
        options: [auto, sonnet, opus]
        default: auto
      max_turns:
        description: Compatibility-only turn limit.
        required: false
        type: string
        default: '60'
      use_web_search:
        description: Compatibility-only flag. No external web search is called.
        type: boolean
        default: false
      auto_commit:
        description: Auto-commit changes. Unsupported by repo-local workflows.
        type: boolean
        default: false
      provider:
        description: Compatibility-only provider label.
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: read

concurrency:
  group: claude-improve-${{ inputs.task_type }}-${{ inputs.scope }}
  cancel-in-progress: true

jobs:
  audit:
    name: Repo-local improvement gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: ${{ inputs.task_type == 'security' && 'strategic' || 'full' }}
      auto_commit: ${{ inputs.auto_commit }}
      provider: ${{ inputs.provider }}
