name: Issue to Code

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number. Recorded for operator context only.
        required: true
        type: string
      model:
        description: Compatibility-only model label.
        type: choice
        options: [auto, sonnet, opus]
        default: auto
      provider:
        description: Compatibility-only provider label.
        type: choice
        options: [claude, codex]
        default: claude

permissions:
  contents: read
  issues: read

concurrency:
  group: issue-to-code-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  audit:
    name: Repo-local issue readiness gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: full
      auto_commit: false
      provider: ${{ inputs.provider }}
