name: Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-security:
    name: OWASP LLM Top 10
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run LLM Security Tests
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.event_name }}" == "release" ]; then
            echo "Running in STRICT MODE for main/release"
            pnpm test:security:strict
          else
            pnpm test:security
          fi
        env:
          NODE_ENV: test
          SECURITY_LOG_RESULTS: true

      - name: Generate Security Report
        if: always()
        run: |
          mkdir -p security-reports
          echo "# OWASP LLM Top 10 Security Test Report" > security-reports/report.md
          echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> security-reports/report.md
          echo "Ref: ${{ github.ref }}" >> security-reports/report.md
          echo "Commit: ${{ github.sha }}" >> security-reports/report.md

      - name: Upload Security Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: |
            security-reports/
            coverage/
          retention-days: 30

  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate job - all security checks must pass
  security-gate:
    name: Security Gate
    needs: [llm-security, dependency-scan, secret-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check Security Results
        run: |
          if [ "${{ needs.llm-security.result }}" != "success" ]; then
            echo "LLM Security tests failed"
            exit 1
          fi
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "Secret scan failed"
            exit 1
          fi
          echo "All security checks passed!"
