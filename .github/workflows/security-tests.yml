name: Security Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/security/**'
      - 'scripts/verify-api-auth-surface.mjs'
      - 'package.json'
      - 'package-lock.json'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-security:
    name: OWASP LLM Top 10
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run LLM Security Tests
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.event_name }}" == "release" ]; then
            echo "Running in STRICT MODE for main/release"
            npm run test:security:strict
          else
            npm run test:security
          fi
        env:
          NODE_ENV: test
          SECURITY_LOG_RESULTS: true

      - name: Verify API auth surface
        run: npm run verify:api-auth-surface

      - name: Generate Security Report
        if: always()
        run: |
          mkdir -p security-reports
          echo "# OWASP LLM Top 10 Security Test Report" > security-reports/report.md
          echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> security-reports/report.md
          echo "Ref: ${{ github.ref }}" >> security-reports/report.md
          echo "Commit: ${{ github.sha }}" >> security-reports/report.md

      - name: Upload Security Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-results
          path: |
            security-reports/
            coverage/
          retention-days: 30

  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Gate job - all security checks must pass
  security-gate:
    name: Security Gate
    needs: [llm-security, dependency-scan, secret-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check Security Results
        run: |
          if [ "${{ needs.llm-security.result }}" != "success" ]; then
            echo "LLM Security tests failed"
            exit 1
          fi
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "Secret scan failed"
            exit 1
          fi
          echo "All security checks passed!"
