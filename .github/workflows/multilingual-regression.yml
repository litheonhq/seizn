name: Multilingual Search Regression

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/lib/langpack/**'
      - 'src/lib/spring/memory-v4/search*'
      - 'src/lib/eval/**'
      - 'src/lib/embeddings/**'

  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/lib/langpack/**'
      - 'src/lib/spring/memory-v4/search*'
      - 'src/lib/eval/**'
      - 'src/lib/embeddings/**'

  workflow_dispatch:
    inputs:
      language:
        description: 'Specific language to test (leave empty for all)'
        required: false
        type: string
      recall_threshold:
        description: 'Minimum mean Recall@10 to pass (0-1)'
        required: false
        default: '0.6'
        type: string

  schedule:
    # Run weekly on Monday at 7 AM UTC
    - cron: '0 7 * * 1'

jobs:
  multilingual-eval:
    name: Multilingual Search Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run multilingual evaluation tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RECALL_THRESHOLD: ${{ github.event.inputs.recall_threshold || '0.6' }}
          TARGET_LANGUAGE: ${{ github.event.inputs.language || '' }}
        run: npx vitest run src/lib/eval/ --reporter=verbose

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multilingual-eval-results-${{ github.sha }}
          path: |
            test-results/
            coverage/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Multilingual Search Regression Detected',
                '',
                'Search quality metrics dropped below the configured threshold.',
                'Please review the evaluation results in the Actions tab before merging.',
                '',
                '**Threshold:** Recall@10 >= ' + ('${{ github.event.inputs.recall_threshold }}' || '0.6'),
                '',
                'Affected paths: `src/lib/langpack/**`, `src/lib/spring/memory-v4/search*`',
              ].join('\n')
            })

  notify-on-failure:
    name: Notify on Scheduled Failure
    runs-on: ubuntu-latest
    needs: multilingual-eval
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Send failure notification
        run: |
          echo "Scheduled multilingual regression tests failed on $(date -u)"
          # Add notification logic here (Slack, email, etc.)
          # Example:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Multilingual search regression detected in weekly run!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
