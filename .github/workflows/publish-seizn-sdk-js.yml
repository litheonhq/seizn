name: Publish @seizn/sdk-js

on:
  push:
    tags:
      - 'sdk-js-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.9.0-beta.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seizn/sdk-js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --prefix packages/seizn-sdk-js

      - name: Build
        run: npm run build --prefix packages/seizn-sdk-js

      - name: Publish
        # --provenance omitted until Trusted Publisher is configured for @seizn/sdk-js on npmjs.com.
        # First-time publish of a new scoped package with --provenance returns 404 on registry PUT.
        # Restore once the package has at least one published version.
        run: npm publish packages/seizn-sdk-js --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PUBLISH }}

  notify:
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify on success
        if: needs.publish.result == 'success'
        run: echo "Successfully published @seizn/sdk-js"

      - name: Notify on failure
        if: needs.publish.result == 'failure'
        run: |
          echo "Failed to publish @seizn/sdk-js"
          exit 1
