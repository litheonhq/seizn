name: AI Research

on:
  workflow_dispatch:
    inputs:
      focus:
        description: Focus area. Security focus enables strategic checks.
        required: false
        default: all
        type: choice
        options: [all, papers, tech, security-advisories]
      max_issues:
        description: Compatibility-only issue limit. Repo-local workflow does not create issues.
        required: false
        default: '10'
      provider:
        description: Compatibility-only provider label.
        required: false
        default: claude
        type: choice
        options: [claude, codex]

permissions:
  contents: read
  issues: read

concurrency:
  group: ai-research-${{ github.ref }}-${{ inputs.focus }}
  cancel-in-progress: false

jobs:
  audit:
    name: Repo-local research readiness gate
    uses: ./.github/workflows/claude-audit.yml
    with:
      depth: ${{ inputs.focus == 'security-advisories' && 'strategic' || 'full' }}
      auto_commit: false
      provider: ${{ inputs.provider }}
