name: Seizn Autopilot - Auto PR Bot

on:
  # Trigger on new trace failures (via repository_dispatch from Seizn)
  repository_dispatch:
    types: [seizn-trace-failure]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID to analyze and fix'
        required: true
        type: string
      dry_run:
        description: 'Preview only, do not create PR'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  SEIZN_API_URL: 'https://api.seizn.com'

jobs:
  analyze:
    name: Analyze Trace Failure
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.analyze.outputs.has_failures }}
      severity: ${{ steps.analyze.outputs.severity }}
      confidence: ${{ steps.analyze.outputs.confidence }}
      analysis_id: ${{ steps.analyze.outputs.analysis_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get trace ID
        id: get_trace
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TRACE_ID: ${{ github.event.inputs.trace_id }}
          PAYLOAD_TRACE_ID: ${{ github.event.client_payload.trace_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'trace_id=%s\n' "$INPUT_TRACE_ID" >> "$GITHUB_OUTPUT"
          else
            printf 'trace_id=%s\n' "$PAYLOAD_TRACE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze trace
        id: analyze
        env:
          TRACE_ID: ${{ steps.get_trace.outputs.trace_id }}
          SEIZN_API_KEY: ${{ secrets.SEIZN_API_KEY }}
        run: |
          BODY=$(jq -n --arg traceId "$TRACE_ID" '{
            traceId: $traceId,
            includeRelated: true
          }')

          RESPONSE=$(curl -s -X POST "$SEIZN_API_URL/api/autopilot/analyze" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $SEIZN_API_KEY" \
            -d "$BODY")

          # Parse response
          SUCCESS=$(echo $RESPONSE | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Analysis failed: $(echo $RESPONSE | jq -r '.error')"
            exit 1
          fi

          FAILURES=$(echo $RESPONSE | jq '.analysis.failures | length')
          SEVERITY=$(echo $RESPONSE | jq -r '.analysis.severity')
          CONFIDENCE=$(echo $RESPONSE | jq -r '.analysis.confidence')

          echo "has_failures=$([ $FAILURES -gt 0 ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          printf 'severity=%s\n' "$SEVERITY" >> "$GITHUB_OUTPUT"
          printf 'confidence=%s\n' "$CONFIDENCE" >> "$GITHUB_OUTPUT"
          printf 'analysis_id=analysis-%s\n' "$TRACE_ID" >> "$GITHUB_OUTPUT"

          # Store analysis for next job
          echo "$RESPONSE" > analysis.json

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis
          path: analysis.json
          retention-days: 7

  generate-fix:
    name: Generate Fix
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.has_failures == 'true' && needs.analyze.outputs.confidence >= 0.7
    outputs:
      has_fix: ${{ steps.fix.outputs.has_fix }}
      pr_context_id: ${{ steps.fix.outputs.pr_context_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get trace ID
        id: get_trace
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TRACE_ID: ${{ github.event.inputs.trace_id }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          PAYLOAD_TRACE_ID: ${{ github.event.client_payload.trace_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'trace_id=%s\n' "$INPUT_TRACE_ID" >> "$GITHUB_OUTPUT"
            printf 'dry_run=%s\n' "$INPUT_DRY_RUN" >> "$GITHUB_OUTPUT"
          else
            printf 'trace_id=%s\n' "$PAYLOAD_TRACE_ID" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate fix
        id: fix
        env:
          TRACE_ID: ${{ steps.get_trace.outputs.trace_id }}
          DRY_RUN: ${{ steps.get_trace.outputs.dry_run }}
          SEIZN_API_KEY: ${{ secrets.SEIZN_API_KEY }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            PREVIEW=true
          else
            PREVIEW=false
          fi

          BODY=$(jq -n --arg traceId "$TRACE_ID" --argjson preview "$PREVIEW" '{
            traceId: $traceId,
            applyAll: false,
            preview: $preview
          }')

          RESPONSE=$(curl -s -X POST "$SEIZN_API_URL/api/autopilot/fix" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $SEIZN_API_KEY" \
            -d "$BODY")

          SUCCESS=$(echo $RESPONSE | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Fix generation failed: $(echo $RESPONSE | jq -r '.error')"
            echo "has_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUGGESTIONS=$(echo $RESPONSE | jq '.appliedSuggestions | length')
          if [ $SUGGESTIONS -eq 0 ]; then
            echo "No applicable suggestions found"
            echo "has_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_fix=true" >> "$GITHUB_OUTPUT"
          printf 'pr_context_id=fix-%s\n' "$TRACE_ID" >> "$GITHUB_OUTPUT"

          # Store fix context for next job
          echo "$RESPONSE" > fix.json

      - name: Upload fix artifact
        uses: actions/upload-artifact@v4
        with:
          name: fix
          path: fix.json
          retention-days: 7

  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    needs: [analyze, generate-fix]
    if: |
      needs.generate-fix.outputs.has_fix == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download fix artifact
        uses: actions/download-artifact@v8
        with:
          name: fix
          path: .

      - name: Get trace ID
        id: get_trace
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TRACE_ID: ${{ github.event.inputs.trace_id }}
          PAYLOAD_TRACE_ID: ${{ github.event.client_payload.trace_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'trace_id=%s\n' "$INPUT_TRACE_ID" >> "$GITHUB_OUTPUT"
          else
            printf 'trace_id=%s\n' "$PAYLOAD_TRACE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract PR context
        id: extract
        run: |
          PR_CONTEXT=$(cat fix.json | jq -c '.prContext')
          echo "pr_context=$PR_CONTEXT" >> $GITHUB_OUTPUT

      - name: Create PR via Seizn API
        id: create_pr
        env:
          TRACE_ID: ${{ steps.get_trace.outputs.trace_id }}
          SEVERITY: ${{ needs.analyze.outputs.severity }}
          CONFIDENCE: ${{ needs.analyze.outputs.confidence }}
        run: |
          PR_CONTEXT=$(cat fix.json | jq -c '.prContext')

          RESPONSE=$(curl -s -X POST "${{ env.SEIZN_API_URL }}/api/autopilot/pr" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.SEIZN_API_KEY }}" \
            -d "{
              \"context\": $PR_CONTEXT,
              \"draft\": false
            }")

          SUCCESS=$(echo $RESPONSE | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "PR creation failed: $(echo $RESPONSE | jq -r '.prRecord.error // .error')"
            exit 1
          fi

          PR_NUMBER=$(echo $RESPONSE | jq -r '.prRecord.prNumber')
          PR_URL=$(echo $RESPONSE | jq -r '.prRecord.prUrl')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          echo "## Autopilot PR Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number:** #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "- **PR URL:** $PR_URL" >> $GITHUB_STEP_SUMMARY
          printf -- '- **Trace ID:** %s\n' "$TRACE_ID" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- **Severity:** %s/10\n' "$SEVERITY" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- **Confidence:** %s\n' "$(echo "$CONFIDENCE" | awk '{printf "%.1f%%", $1 * 100}')" >> "$GITHUB_STEP_SUMMARY"

      - name: Post Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          TRACE_ID: ${{ steps.get_trace.outputs.trace_id }}
          SEVERITY: ${{ needs.analyze.outputs.severity }}
        run: |
          BODY=$(jq -n \
            --arg prNumber "$PR_NUMBER" \
            --arg prUrl "$PR_URL" \
            --arg traceId "$TRACE_ID" \
            --arg severity "$SEVERITY" \
            '{
              text: ("Seizn Autopilot created PR #" + $prNumber),
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*Seizn Autopilot* created a new PR\n\n*PR:* <" + $prUrl + "|#" + $prNumber + ">\n*Trace:* `" + $traceId + "`\n*Severity:* " + $severity + "/10")
                  }
                }
              ]
            }')
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [analyze, generate-fix]
    if: always()

    steps:
      - name: Download analysis artifact
        uses: actions/download-artifact@v8
        with:
          name: analysis
          path: .
        continue-on-error: true

      - name: Download fix artifact
        uses: actions/download-artifact@v8
        with:
          name: fix
          path: .
        continue-on-error: true

      - name: Generate summary report
        run: |
          echo "## Seizn Autopilot Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f analysis.json ]; then
            FAILURES=$(cat analysis.json | jq '.analysis.failures | length')
            SEVERITY=$(cat analysis.json | jq -r '.analysis.severity')
            CONFIDENCE=$(cat analysis.json | jq -r '.analysis.confidence')
            SUGGESTIONS=$(cat analysis.json | jq '.analysis.suggestions | length')

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Failures Detected | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | $SEVERITY/10 |" >> $GITHUB_STEP_SUMMARY
            echo "| Confidence | $(echo $CONFIDENCE | awk '{printf "%.1f%%", $1 * 100}') |" >> $GITHUB_STEP_SUMMARY
            echo "| Suggestions | $SUGGESTIONS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ $FAILURES -gt 0 ]; then
              echo "### Detected Failures" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              cat analysis.json | jq -r '.analysis.failures[] | "- **\(.type)**: \(.message)"' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No analysis data available." >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f fix.json ]; then
            APPLIED=$(cat fix.json | jq '.appliedSuggestions | length')
            echo "### Fix Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Applied Suggestions: $APPLIED" >> $GITHUB_STEP_SUMMARY
            echo "- Preview Only: $(cat fix.json | jq -r '.previewOnly')" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report to Seizn
        if: always()
        run: |
          # Optional: Upload report back to Seizn for tracking
          echo "Report generation complete"
        continue-on-error: true
