name: Publish JavaScript SDK

on:
  push:
    tags:
      - 'js-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify on success
        if: needs.publish.result == 'success'
        run: echo "Successfully published seizn JavaScript SDK"

      - name: Notify on failure
        if: needs.publish.result == 'failure'
        run: |
          echo "Failed to publish seizn JavaScript SDK"
          exit 1
