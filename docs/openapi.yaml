      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info]
          description: Filter by severity
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved]
          description: Filter by status
      responses:
        '200':
          description: RetOps alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        severity:
                          type: string
                          enum: [critical, warning, info]
                        type:
                          type: string
                        message:
                          type: string
                        triggeredAt:
                          type: string
                          format: date-time
                        status:
                          type: string
                          enum: [active, resolved]
                  summary:
                    type: object
                    properties:
                      critical:
                        type: integer
                      warning:
                        type: integer
                      info:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey

  schemas:
    MemoryType:
      type: string
      enum: [fact, preference, experience, relationship, instruction]

    MemoryScope:
      type: string
      enum: [user, session, agent]

    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string
        namespace:
          type: string
        scope:
          $ref: '#/components/schemas/MemoryScope'
        importance:
          type: integer
          minimum: 1
          maximum: 10
        confidence:
          type: number
          minimum: 0
          maximum: 1
        created_at:
          type: string
          format: date-time

    MemorySearchResult:
      allOf:
        - $ref: '#/components/schemas/Memory'
        - type: object
          properties:
            similarity:
              type: number
              description: Cosine similarity score
            keyword_rank:
              type: number
              description: BM25 rank (hybrid mode only)
            combined_score:
              type: number
              description: RRF combined score (hybrid mode only)

    AddMemoryRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Memory content
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string
        namespace:
          type: string
          default: default
        scope:
          $ref: '#/components/schemas/MemoryScope'
        session_id:
          type: string
        agent_id:
          type: string
        source:
          type: string

    ExtractedMemory:
      type: object
      properties:
        content:
          type: string
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string
        confidence:
          type: number
        importance:
          type: integer

    ExportedMemory:
      type: object
      description: Memory data for export (without embedding)
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string
        namespace:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 10
        source:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookEvent:
      type: string
      enum: [memory.created, memory.updated, memory.deleted]

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'
        namespace:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhook_id:
          type: string
          format: uuid
        webhook_name:
          type: string
        event_type:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        status_code:
          type: integer
          nullable: true
        error_message:
          type: string
          nullable: true
        attempt_count:
          type: integer
        created_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

    # CI API Schemas
    CITrace:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed]
        branch:
          type: string
        commit:
          type: string
        repository:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          description: Duration in milliseconds
        metadata:
          type: object

    TestResult:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [passed, failed, skipped]
        duration:
          type: integer
        file:
          type: string
        error:
          type: string
          nullable: true

    # Autopilot API Schemas
    AnalysisResult:
      type: object
      properties:
        analysisId:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        issues:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              severity:
                type: string
                enum: [critical, high, medium, low]
              type:
                type: string
              file:
                type: string
              line:
                type: integer
              message:
                type: string
              suggestion:
                type: string
        summary:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer

    FixResult:
      type: object
      properties:
        fixId:
          type: string
        status:
          type: string
          enum: [completed, partial, failed]
        fixes:
          type: array
          items:
            type: object
            properties:
              issueId:
                type: string
              file:
                type: string
              diff:
                type: string
              applied:
                type: boolean
        summary:
          type: object
          properties:
            total:
              type: integer
            applied:
              type: integer
            skipped:
              type: integer

    AutopilotPR:
      type: object
      properties:
        prId:
          type: string
        url:
          type: string
        status:
          type: string
          enum: [open, merged, closed]
        branch:
          type: string
        commits:
          type: integer
        filesChanged:
          type: integer

    # Contracts API Schemas
    Contract:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [active, deprecated, draft]
        schema:
          type: object
        description:
          type: string
        endpoints:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Healing API Schemas
    HealingAnalysis:
      type: object
      properties:
        analysisId:
          type: string
        canHeal:
          type: boolean
        confidence:
          type: number
        suggestedFixes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              description:
                type: string
              impact:
                type: string
                enum: [low, medium, high]
              automated:
                type: boolean
        rootCause:
          type: string

    # Versions API Schemas
    Version:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        data:
          type: object
        message:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    # Explain API Schemas
    QueryExplanation:
      type: object
      properties:
        queryId:
          type: string
        originalQuery:
          type: string
        explanation:
          type: object
          properties:
            steps:
              type: array
              items:
                type: object
                properties:
                  step:
                    type: integer
                  operation:
                    type: string
                  table:
                    type: string
                  estimatedRows:
                    type: integer
            totalCost:
              type: integer
            estimatedTime:
              type: string
        optimizations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              suggestion:
                type: string
              impact:
                type: string
                enum: [low, medium, high]
              estimatedImprovement:
                type: string
        createdAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
