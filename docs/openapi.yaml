                  indexSize:
                    type: string
                  namespaces:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        documents:
                          type: integer
                  lastUpdated:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/summer/retops/quality:
    get:
      tags: [RetOps]
      summary: Get quality metrics
      description: Get retrieval quality metrics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
          description: Time period
      responses:
        '200':
          description: Quality metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  quality:
                    type: object
                    properties:
                      avgRelevanceScore:
                        type: number
                      mrr:
                        type: number
