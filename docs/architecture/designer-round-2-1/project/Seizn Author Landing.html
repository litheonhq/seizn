<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Seizn Author — landing</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="tokens.css" />

<style>
  html, body { background: var(--ink-0); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand-marks.jsx"></script>
<script type="text/babel" src="conflict-detector.jsx"></script>
<script type="text/babel" src="canon-graph.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="section-workflow.jsx"></script>
<script type="text/babel" src="section-inputs.jsx"></script>
<script type="text/babel" src="section-conflicts.jsx"></script>
<script type="text/babel" src="section-simulation.jsx"></script>
<script type="text/babel" src="section-rest.jsx"></script>
<script type="text/babel" src="section-mobile.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState: useStateApp, useEffect: useEffectApp } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "markVariant": "graph",
  "showEngineTease": false,
  "viewport": "desktop"
}/*EDITMODE-END*/;

function FullLanding({ markVariant, showEngineTease }) {
  return (
    <div data-screen-label="Full landing · desktop">
      {showEngineTease && <EngineTease />}
      <HeroSplitDetector markVariant={markVariant} />
      <Workflow />
      <Inputs />
      <Conflicts />
      <Simulation />
      <Trust />
      <Pricing />
      <FAQ />
      <Footer markVariant={markVariant} />
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas
        title="Seizn Author"
        subtitle="Round 2 · full landing + responsive viewports · pick + ship"
      >
        {/* —— Full landing —— */}
        <DCSection
          id="full"
          title="Full landing · 9 sections"
          subtitle="Hero B locked + Mark A locked. All P2 polish items applied. Engine tease toggle in Tweaks."
        >
          <DCArtboard id="full-desktop" label="Desktop · 1440" width={1440} height={5400}>
            <FullLanding markVariant={tweaks.markVariant} showEngineTease={tweaks.showEngineTease} />
          </DCArtboard>
        </DCSection>

        {/* —— Mobile + tablet —— */}
        <DCSection
          id="responsive"
          title="Responsive · hero parity"
          subtitle="360 + 768 viewports. Item R: hero never feels empty on small screens — character chip strip + simplified plan picker."
        >
          <DCArtboard id="mobile-360" label="Mobile · 360" width={360} height={680}>
            <MobileHero markVariant={tweaks.markVariant} />
          </DCArtboard>
          <DCArtboard id="tablet-768" label="Tablet · 768" width={768} height={680}>
            <TabletHero markVariant={tweaks.markVariant} />
          </DCArtboard>
        </DCSection>

        {/* —— Brand mark candidates (kept for reference) —— */}
        <DCSection
          id="brand-marks"
          title="Brand mark — candidates"
          subtitle="Mark A locked as primary. Mark D held in reserve as editorial fallback."
        >
          <DCArtboard id="mark-graph" label="A · Canon-graph node · LOCKED" width={320} height={360}>
            <BrandMarkCard variant="graph" kind="primary · locked" label="Canon-graph node" note="4 nodes + 4 edges. Survives at 16px favicon. Reads as the product promise." />
          </DCArtboard>
          <DCArtboard id="mark-strata" label="B · Strata" width={320} height={360}>
            <BrandMarkCard variant="strata" kind="archived" label="Memory strata" note="Archived after round 1." />
          </DCArtboard>
          <DCArtboard id="mark-bracket" label="C · Bracketed" width={320} height={360}>
            <BrandMarkCard variant="bracket" kind="archived" label="Bracketed" note="Archived after round 1." />
          </DCArtboard>
          <DCArtboard id="mark-dot" label="D · Wordmark + dot · FALLBACK" width={320} height={360}>
            <BrandMarkCard variant="dot" kind="editorial fallback" label="Wordmark, period." note="Kept in reserve. Swap-ready if market reads tech-skewed." />
          </DCArtboard>
        </DCSection>

        {/* —— Favicon scale check —— */}
        <DCSection
          id="favicon"
          title="Favicon scale check"
          subtitle="Mark A at 32px / 24px / 16px. Stroke 1.4 holds. Light + dark backgrounds verified."
        >
          <DCArtboard id="fav-light" label="Light · 32 / 24 / 16" width={420} height={200}>
            <div style={{ padding: 30, display: 'flex', alignItems: 'center', gap: 32, background: 'var(--ink-0)', height: '100%' }}>
              <FaviconScale size={32} tone="dark" />
              <FaviconScale size={24} tone="dark" />
              <FaviconScale size={16} tone="dark" />
              <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--ink-500)' }}>
                light bg
              </span>
            </div>
          </DCArtboard>
          <DCArtboard id="fav-dark" label="Dark · 32 / 24 / 16" width={420} height={200}>
            <div style={{ padding: 30, display: 'flex', alignItems: 'center', gap: 32, background: 'var(--ink-900)', height: '100%' }}>
              <FaviconScale size={32} tone="light" />
              <FaviconScale size={24} tone="light" />
              <FaviconScale size={16} tone="light" />
              <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'oklch(1 0 0 / 0.6)' }}>
                dark bg
              </span>
            </div>
          </DCArtboard>
        </DCSection>

        {/* —— Tokens (locked) —— */}
        <DCSection
          id="system"
          title="Design system — V1 LOCKED"
          subtitle="Replaces the cyan-300/500/600/700/900 mix. Monochrome slate + 3 signals."
        >
          <DCArtboard id="tokens-color" label="Color tokens · locked" width={520} height={460}>
            <ColorTokensCard />
          </DCArtboard>
          <DCArtboard id="tokens-type" label="Type pairing · locked" width={520} height={460}>
            <TypeTokensCard />
          </DCArtboard>
          <DCArtboard id="tokens-comp" label="Components · locked" width={520} height={460}>
            <ComponentTokensCard />
          </DCArtboard>
        </DCSection>

        {/* —— Notes —— */}
        <DCSection
          id="notes"
          title="Round 2 notes + open"
          subtitle="What landed, what's still open, what comes next."
        >
          <DCArtboard id="round2-notes" label="Round 2 summary" width={620} height={540}>
            <Round2Notes />
          </DCArtboard>
          <DCArtboard id="open-questions" label="Still open" width={620} height={540}>
            <OpenQs />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <SeiznTweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

/* ——— Tweaks panel ——— */
function SeiznTweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Brand">
        <TweakRadio
          label="Mark"
          value={tweaks.markVariant}
          onChange={(v) => setTweak('markVariant', v)}
          options={[
            { value: 'graph', label: 'A · Graph' },
            { value: 'dot', label: 'D · Dot' },
            { value: 'strata', label: 'B · Strata' },
            { value: 'bracket', label: 'C · [s]' },
          ]}
        />
      </TweakSection>
      <TweakSection title="Engine SDK">
        <TweakToggle
          label="Show engine.seizn.com tease (W7+ preview)"
          value={tweaks.showEngineTease}
          onChange={(v) => setTweak('showEngineTease', v)}
        />
      </TweakSection>
    </TweaksPanel>
  );
}

/* ——— Favicon scale renderer ——— */
function FaviconScale({ size, tone }) {
  const color = tone === 'dark' ? 'var(--ink-900)' : 'var(--ink-0)';
  const stroke = size <= 16 ? 1.8 : 1.4;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
      <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
        {size > 16 && (
          <>
            <line x1="8" y1="9" x2="22" y2="11" stroke={color} strokeWidth={stroke} strokeLinecap="round" opacity="0.6" />
            <line x1="8" y1="9" x2="11" y2="23" stroke={color} strokeWidth={stroke} strokeLinecap="round" opacity="0.6" />
            <line x1="22" y1="11" x2="24" y2="23" stroke={color} strokeWidth={stroke} strokeLinecap="round" opacity="0.6" />
            <line x1="11" y1="23" x2="24" y2="23" stroke={color} strokeWidth={stroke} strokeLinecap="round" opacity="0.6" />
            <circle cx="8" cy="9" r="3" fill={color} />
            <circle cx="22" cy="11" r="2.4" fill={color} />
            <circle cx="11" cy="23" r="2.2" fill={color} />
            <circle cx="24" cy="23" r="3.2" fill={color} />
          </>
        )}
        {size <= 16 && (
          <>
            <line x1="9" y1="10" x2="22" y2="22" stroke={color} strokeWidth="2" strokeLinecap="round" opacity="0.7" />
            <line x1="22" y1="10" x2="9" y2="22" stroke={color} strokeWidth="2" strokeLinecap="round" opacity="0.5" />
            <circle cx="9" cy="10" r="4" fill={color} />
            <circle cx="22" cy="22" r="4" fill={color} />
            <circle cx="22" cy="10" r="3" fill={color} />
          </>
        )}
      </svg>
      <span className="mono" style={{
        fontSize: 10,
        color: tone === 'dark' ? 'var(--ink-500)' : 'oklch(1 0 0 / 0.55)',
      }}>
        {size}px
      </span>
    </div>
  );
}

/* ——— Token cards ——— */
function ColorTokensCard() {
  const swatches = [
    { name: '0', val: 'oklch(0.99 0.003 250)' },
    { name: '100', val: 'oklch(0.95 0.006 250)' },
    { name: '300', val: 'oklch(0.80 0.01 250)' },
    { name: '500', val: 'oklch(0.50 0.014 250)' },
    { name: '700', val: 'oklch(0.28 0.016 250)' },
    { name: '900', val: 'oklch(0.14 0.012 250)' },
  ];
  const signals = [
    { name: 'canon', val: 'oklch(0.62 0.16 148)', label: 'validated' },
    { name: 'pending', val: 'oklch(0.72 0.13 85)', label: 'review' },
    { name: 'conflict', val: 'oklch(0.60 0.21 27)', label: 'broken' },
  ];
  return (
    <div style={{ padding: 24, background: 'var(--ink-0)', height: '100%' }}>
      <div className="eyebrow" style={{ marginBottom: 16 }}>monochrome scale</div>
      <div style={{ display: 'flex', gap: 4, marginBottom: 24 }}>
        {swatches.map((s) => (
          <div key={s.name} style={{ flex: 1 }}>
            <div style={{ height: 48, background: s.val, borderRadius: 6, border: '1px solid var(--ink-100)' }} />
            <div className="mono" style={{ fontSize: 9, color: 'var(--ink-500)', marginTop: 6 }}>{s.name}</div>
          </div>
        ))}
      </div>
      <div className="eyebrow" style={{ marginBottom: 16 }}>semantic signals</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {signals.map((s) => (
          <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: s.val, flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div className="mono" style={{ fontSize: 11, color: 'var(--ink-700)' }}>--signal-{s.name}</div>
              <div style={{ fontSize: 13, color: 'var(--ink-500)' }}>{s.label}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TypeTokensCard() {
  return (
    <div style={{ padding: 24, background: 'var(--ink-0)', height: '100%' }}>
      <div className="eyebrow" style={{ marginBottom: 12 }}>display · source serif 4</div>
      <div className="serif" style={{ fontSize: 38, color: 'var(--ink-900)', lineHeight: 1.05, marginBottom: 24 }}>
        Catch every <em style={{fontStyle:'italic'}}>contradiction</em>.
      </div>
      <div className="eyebrow" style={{ marginBottom: 12 }}>body · pretendard</div>
      <div style={{ fontSize: 16, color: 'var(--ink-700)', lineHeight: 1.55, marginBottom: 24, maxWidth: 420 }}>
        Pretendard handles ko/ja/zh-hans uniformly. 16/1.55, -0.005em tracking.
      </div>
      <div className="eyebrow" style={{ marginBottom: 12 }}>mono · jetbrains mono</div>
      <div className="mono" style={{ fontSize: 13, color: 'var(--ink-700)' }}>
        canon.han_iseul.class = 1
      </div>
    </div>
  );
}

function ComponentTokensCard() {
  return (
    <div style={{ padding: 24, background: 'var(--ink-0)', height: '100%', display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div>
        <div className="eyebrow" style={{ marginBottom: 10 }}>buttons</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button className="btn btn-primary-dark">Primary</button>
          <button className="btn btn-ghost-dark">Secondary</button>
        </div>
      </div>
      <div>
        <div className="eyebrow" style={{ marginBottom: 10 }}>badges</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <span className="badge badge-canon"><span className="badge-dot" />canon</span>
          <span className="badge badge-pending"><span className="badge-dot" />pending</span>
          <span className="badge badge-conflict"><span className="badge-dot" />conflict</span>
          <span className="badge badge-neutral"><span className="badge-dot" />neutral</span>
        </div>
      </div>
      <div>
        <div className="eyebrow" style={{ marginBottom: 10 }}>card</div>
        <div className="card" style={{ padding: 14 }}>
          <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 4 }}>Canon ledger</div>
          <div style={{ fontSize: 13, color: 'var(--ink-500)' }}>8 chars · 22 rules · 30 days</div>
        </div>
      </div>
      <div>
        <div className="eyebrow" style={{ marginBottom: 10 }}>input</div>
        <input
          placeholder="Propose a fact…"
          style={{
            width: '100%', padding: '10px 14px',
            border: '1px solid var(--ink-200)', borderRadius: 'var(--radius-md)',
            fontSize: 14, fontFamily: 'var(--font-sans)', color: 'var(--ink-900)',
            background: 'var(--ink-0)', outline: 'none',
          }}
        />
      </div>
    </div>
  );
}

function Round2Notes() {
  return (
    <div style={{ padding: 28, background: 'var(--ink-0)', height: '100%', overflow: 'auto' }}>
      <div className="eyebrow" style={{ marginBottom: 14 }}>round 2 — what landed</div>
      <h3 className="serif" style={{ fontSize: 22, margin: '0 0 14px', color: 'var(--ink-900)' }}>
        9 sections, 2 viewports, 1 ledger.
      </h3>
      <ul style={{ fontSize: 13.5, color: 'var(--ink-700)', lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
        <li><strong>T</strong> — Workflow now numbered horizontal flow with disc indicators on a connecting line.</li>
        <li><strong>Inputs</strong> — 4 modes with distinct glyphs + per-mode preview (native/docx/markdown/gdocs).</li>
        <li><strong>Conflicts</strong> — Severity-graded card list (critical/major/minor) + the canon graph anchored beside.</li>
        <li><strong>Simulation</strong> — Safe vs Risk candidate split with continuity gauge + token-level diff.</li>
        <li><strong>Trust</strong> — 4-item glyph grid (KNOT, BYOK, Replay, SFW).</li>
        <li><strong>Pricing</strong> — Indie/Pro emphasized as primary cards; Studio/Enterprise as slim rows below.</li>
        <li><strong>Q</strong> — Engine tease designed but env-gated. Tweak toggle previews the W7+ state.</li>
        <li><strong>R</strong> — 360 + 768 mobile heroes with character chip strip; KO line-break check pending lang round.</li>
        <li><strong>Detector seed</strong> — Default fact is now the Class 2 transfer scenario, eye-color demoted to a chip.</li>
      </ul>
    </div>
  );
}

function OpenQs() {
  return (
    <div style={{ padding: 28, background: 'var(--ink-0)', height: '100%', overflow: 'auto' }}>
      <div className="eyebrow" style={{ marginBottom: 14 }}>still open · for round 3</div>
      <ol style={{ fontSize: 13.5, color: 'var(--ink-700)', lineHeight: 1.7, paddingLeft: 18, margin: 0 }}>
        <li>Lang sweep — render the same artboards in ko / ja / zh-hans. Pretendard already linked. KO hero needs balanced wrap test on 360.</li>
        <li>Animation pass — graph edges draw on first viewport entry; conflict pulse softer; reduce-motion guard.</li>
        <li>Empty states — what does the canon ledger look like before any input is loaded? Onboarding nudge?</li>
        <li>Pricing yearly toggle — currently inline in hero only. Add to the pricing section too?</li>
        <li>BYOK 50% off badge — surface on each tier card or in a separate strip?</li>
        <li>FAQ depth — 5 questions feel right, or expand to 7-9 for SEO?</li>
      </ol>
      <div style={{ marginTop: 20, padding: 14, background: 'var(--signal-canon-soft)', borderRadius: 8, fontSize: 13, color: 'var(--signal-canon-ink)', lineHeight: 1.55 }}>
        <strong>Recommend:</strong> ship V1 as-is to founding members → collect 4-week feedback → round 3 = lang sweep + animation pass + empty states.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
