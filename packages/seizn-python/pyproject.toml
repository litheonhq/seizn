[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "seizn"
version = "0.1.0"
description = "Seizn - Semantic Memory & RAG Infrastructure SDK for AI Applications"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [
    { name = "Seizn", email = "support@seizn.com" }
]
keywords = [
    "seizn",
    "ai",
    "memory",
    "rag",
    "semantic-search",
    "vector-database",
    "llm",
    "embeddings"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://seizn.com"
Documentation = "https://docs.seizn.com"
Repository = "https://github.com/iruhana/seizn"
Issues = "https://github.com/iruhana/seizn/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/seizn"]

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
