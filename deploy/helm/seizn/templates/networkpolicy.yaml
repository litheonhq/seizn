{{- if .Values.security.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "seizn.fullname" . }}
  labels:
    {{- include "seizn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "seizn.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.security.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.security.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.security.networkPolicy.ingress.enabled }}
  ingress:
    # Allow ingress from nginx-ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow ingress from same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  {{- end }}
  {{- if .Values.security.networkPolicy.egress.enabled }}
  egress:
    # Allow egress to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow egress to Qdrant
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: qdrant
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS egress (for external APIs like OpenAI)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}
