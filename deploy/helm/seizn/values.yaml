# Seizn Helm Chart Values
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/api-gateway
    tag: "1.0.0"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

spring:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/spring-service
    tag: "1.0.0"

summer:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/summer-service
    tag: "1.0.0"

winter:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/winter-service
    tag: "1.0.0"

postgresql:
  enabled: true
  auth:
    database: seizn
    username: seizn
  primary:
    persistence:
      enabled: true
      size: 100Gi

redis:
  enabled: true
  auth:
    enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Ingress Configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: seizn.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: seizn-tls
      hosts:
        - seizn.example.com

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Application Configuration
config:
  nodeEnv: "production"
  logLevel: "info"
  enableAuditLogging: "true"
  enableRateLimiting: "true"
  enableToolGating: "true"
  otelEndpoint: ""

# Secrets (set via --set or separate values file)
secrets:
  create: false
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""
  encryptionKey: ""
  openaiApiKey: ""
  anthropicApiKey: ""

# External Secrets Operator Integration
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: "vault-backend"
    kind: "ClusterSecretStore"
  data: []

# Network Policies
networkPolicy:
  enabled: true
  allowExternal: false
