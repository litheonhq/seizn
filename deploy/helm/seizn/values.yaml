# Seizn Helm Chart Values
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/api-gateway
    tag: "1.0.0"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

spring:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/spring-service
    tag: "1.0.0"

summer:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/summer-service
    tag: "1.0.0"

winter:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/seizn/winter-service
    tag: "1.0.0"

postgresql:
  enabled: true
  auth:
    database: seizn
    username: seizn
  primary:
    persistence:
      enabled: true
      size: 100Gi

redis:
  enabled: true
  auth:
    enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Ingress Configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: seizn.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: seizn-tls
      hosts:
        - seizn.example.com

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Application Configuration
config:
  nodeEnv: "production"
  logLevel: "info"
  enableAuditLogging: "true"
  enableRateLimiting: "true"
  enableToolGating: "true"
  otelEndpoint: ""

# Secrets (set via --set or separate values file)
secrets:
  create: false
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""
  encryptionKey: ""
  openaiApiKey: ""
  anthropicApiKey: ""

# External Secrets Operator Integration
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: "vault-backend"
    kind: "ClusterSecretStore"
  data: []

# Network Policies
networkPolicy:
  enabled: true
  allowExternal: false

# ==============================================
# Enterprise Features (Self-Hosted)
# ==============================================

enterprise:
  # License configuration
  license:
    enabled: false
    # License key (or use secret)
    key: ""
    # Use existing secret for license key
    existingSecret: ""
    existingSecretKey: "license-key"
    # Offline validation (for air-gapped)
    offlineValidation: false

  # Air-gapped deployment
  airGapped:
    enabled: false
    # Private container registry
    imageRegistry: ""
    imagePullSecrets:
      - name: private-registry

  # SSO/OIDC Configuration
  sso:
    enabled: false
    provider: "oidc"  # oidc, saml, okta, azure-ad
    # OIDC settings
    oidc:
      issuerUrl: ""
      clientId: ""
      clientSecret: ""
      # Use existing secret
      existingSecret: ""
      existingSecretClientIdKey: "client-id"
      existingSecretClientSecretKey: "client-secret"
      scopes:
        - openid
        - email
        - profile
    # Allowed domains for SSO
    allowedDomains: []

  # KMS Configuration for Evidence Pack Signing
  kms:
    enabled: false
    provider: "local"  # local, aws, azure, gcp
    aws:
      region: "us-east-1"
      keyId: ""
      # Use IRSA (IAM Roles for Service Accounts)
      useIRSA: true
      # Or provide credentials
      accessKeyId: ""
      secretAccessKey: ""
      existingSecret: ""
    azure:
      keyVaultUrl: ""
      keyName: ""
      # Uses workload identity by default
      useWorkloadIdentity: true
    gcp:
      projectId: ""
      locationId: "global"
      keyRingId: ""
      keyId: ""
      # Uses workload identity by default
      useWorkloadIdentity: true

  # Audit Logging
  audit:
    enabled: true
    # Log retention days
    retentionDays: 90
    # Export to external systems
    export:
      enabled: false
      type: "syslog"  # syslog, splunk, datadog, custom
      endpoint: ""
      # For Splunk
      splunkToken: ""
      # For custom webhook
      webhookUrl: ""
      webhookSecret: ""

  # Data Residency
  dataResidency:
    enabled: false
    region: ""  # us, eu, apac, custom
    # Enforce data locality
    enforceLocality: true
    # Allowed storage regions
    allowedRegions:
      - us-east-1
      - us-west-2

  # Custom RBAC Roles
  rbac:
    enabled: true
    # Pre-defined custom roles
    customRoles: []
    # Example:
    # - name: data-scientist
    #   permissions:
    #     - memories:read
    #     - memories:write
    #     - traces:read
    #   description: "Data scientist role with memory access"

  # Resource Quotas per Organization
  quotas:
    enabled: false
    defaults:
      maxUsers: 100
      maxMemoryGB: 50
      maxRequestsPerMonth: 1000000
      maxTracesPerMonth: 500000

# Vector Database Configuration
vectorDb:
  # Use embedded Qdrant or external
  type: "embedded"  # embedded, external
  external:
    host: ""
    port: 6333
    apiKey: ""
    collection: "seizn"
  embedded:
    persistence:
      enabled: true
      size: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

# Monitoring & Observability
monitoring:
  enabled: true
  # Prometheus metrics
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
      interval: 30s
  # Grafana dashboards
  grafana:
    enabled: false
    dashboards:
      enabled: true
  # Tracing
  tracing:
    enabled: false
    provider: "otlp"  # otlp, jaeger, zipkin
    endpoint: ""
    samplingRate: 0.1

# Backup & Recovery
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30
  # Storage backend
  storage:
    type: "s3"  # s3, gcs, azure, local
    bucket: ""
    prefix: "seizn-backups"
    # Credentials (or use IRSA/Workload Identity)
    accessKeyId: ""
    secretAccessKey: ""
